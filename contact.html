<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Contact - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <a href="./index.html">Home</a>
            <a href="./aboutMe.html">About Me</a>
            <a href="./projects.html">Projects</a>
            <a href="./skills.html">Skills</a>
            <a href="./contact.html">Contact</a>

            <button id="theme-toggle" class="theme-btn">☀️</button>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Get In Touch</h2>
            <p>I am currently looking for new opportunities. Whether you have a question or just want to say hi, I'll try my best to
            get back to you!</p>

            <form action="https://formspree.io/f/mlgajbbo" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter Your Name">
                </div>

                <div class="form-group">
                    <label for="уьфшд">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter Your Email">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Enter Your Message"></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>

                <div class="social-links-container">
                    <h3>Or connect with me via:</h3>
                    <div class="social-links">
                        <a href="https://t.me/OverSitle" target="_blank" class="social-btn telegram">Telegram</a>
                        <a href="https://wa.me/420606077315" target="_blank" class="social-btn whatsapp">WhatsApp</a>
                        <a href="https://linkedin.com/in/stepan-belotelov" target="_blank" class="social-btn linkedin">LinkedIn</a>
                        <a href="https://github.com/stepanbelotelov" target="_blank" class="social-btn github">GitHub</a>
                    </div>
                </div>
            </form>
            
        </section>
    </main>

    <script src="./script.js"></script>
